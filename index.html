<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RMU CSSU T2 Dashboard FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f8; }
.app { display:flex; height:100vh; }
.left { width:55%; padding:16px; overflow:auto; background:white; }
.right { width:45%; border-left:1px solid #ccc; }
iframe { width:100%; height:100%; border:none; }

button { padding:10px; margin:5px; cursor:pointer; }
.card { background:#f8fafc; padding:10px; margin:10px 0; border:1px solid #ddd; }

table { width:100%; border-collapse:collapse; font-size:13px; }
th, td { border:1px solid #ccc; padding:6px; }

.onduty { background:#d1fae5; }
.cancel { background:#fee2e2; }
.add { background:#fef3c7; }
</style>
</head>

<body>

<div class="app">

<div class="left">

<h2>RMU CSSU T2 Dashboard FINAL</h2>

<div class="card">
Upload RMU Initial Excel<br>
<input type="file" id="rmuFile"><br>

<button onclick="loadRMU()">1. Load RMU</button>
<button onclick="loadGoogleSheet()">2. Load Google Sheet</button>
<button onclick="analyze()">3. Analyze</button>
<button onclick="exportExcel()">4. Export Final Excel</button>
</div>

<div class="card">
<div>Detected Date: <span id="date">-</span></div>
<div>Status: <span id="status">Waiting...</span></div>
</div>

<table id="table">
<tr>
<th>Remark</th>
<th>Personnel no.</th>
<th>Name</th>
<th>Deployment Location</th>
<th>Google Flight / Remark</th>
</tr>
</table>

</div>

<div class="right">
<iframe src="https://docs.google.com/spreadsheets/d/1i_OR3qFI6lFryycpmuwg1M5mwxxKNRXNZS77MbOp5qc/edit?gid=1412520827"></iframe>
</div>

</div>

<script>
const SHEET_ID = "1i_OR3qFI6lFryycpmuwg1M5mwxxKNRXNZS77MbOp5qc";

let rmuData = [];
let sheetData = [];
let finalData = [];
let sheetTab = "";

function clean(v){
    return (v ?? "").toString().replace(/\s+/g, " ").trim();
}

function norm(v){
    return clean(v).replace(/\.0$/, "");
}

function cellText(cell){
    if(!cell) return "";
    return clean(cell.f ?? cell.v ?? "");
}

function setStatus(s){
    document.getElementById("status").innerText = s;
}

function detectDate(name){
    let m = name.match(/(\d{6})/);
    if(!m) return "";

    let d = m[1];
    return d.slice(0,2) + "." + d.slice(2,4) + ".20" + d.slice(4,6);
}

function parseTimeFromShift(shift){
    let m = clean(shift).match(/(\d{4})\s*[-–]\s*(\d{4})/);

    if(!m){
        return { start:"", end:"", hours:"" };
    }

    let startRaw = m[1];
    let endRaw = m[2];

    let start = startRaw.slice(0,2) + ":" + startRaw.slice(2,4);
    let end = endRaw.slice(0,2) + ":" + endRaw.slice(2,4);

    let sh = parseInt(startRaw.slice(0,2));
    let sm = parseInt(startRaw.slice(2,4));
    let eh = parseInt(endRaw.slice(0,2));
    let em = parseInt(endRaw.slice(2,4));

    let startMin = sh * 60 + sm;
    let endMin = eh * 60 + em;

    if(endMin <= startMin){
        endMin += 24 * 60;
    }

    let diff = endMin - startMin;
    let hh = Math.floor(diff / 60);
    let mm = diff % 60;

    return {
        start,
        end,
        hours: hh + ":" + String(mm).padStart(2, "0")
    };
}

function loadRMU(){
    let file = document.getElementById("rmuFile").files[0];

    if(!file){
        alert("Upload RMU first");
        return;
    }

    sheetTab = detectDate(file.name);
    document.getElementById("date").innerText = sheetTab || "Cannot detect";

    if(!sheetTab){
        setStatus("Cannot detect date from RMU filename. Example filename should contain 240426.");
        return;
    }

    let reader = new FileReader();

    reader.onload = e => {
        try{
            let wb = XLSX.read(new Uint8Array(e.target.result), {
                type: "array",
                cellDates: true
            });

            let ws = wb.Sheets[wb.SheetNames[0]];

            let rows = XLSX.utils.sheet_to_json(ws, {
                defval: "",
                raw: false
            });

            rmuData = rows
                .filter(r => clean(r["Deployment Location"]).includes("CSSU T2"))
                .map(r => ({
                    original: {
                        "External Demand ID": clean(r["External Demand ID"]),
                        "Deployment Location": clean(r["Deployment Location"]),
                        "Deployment Date": clean(r["Deployment Date"]),
                        "Shift Start Time": clean(r["Shift Start Time"]),
                        "Shift End Time": clean(r["Shift End Time"]),
                        "Total Shift Hours": clean(r["Total Shift Hours"] || r["TOTAL SHIFT HOURS"]),
                        "Personnel no.": norm(r["Personnel no."]),
                        "Person First Name": clean(r["Person First Name"]),
                        "Person Last Name": clean(r["Person Last Name"])
                    },
                    id: norm(r["Personnel no."]),
                    shift: clean(r["Deployment Location"])
                }))
                .filter(r => r.id);

            setStatus("RMU Loaded: " + rmuData.length + " CSSU T2 officers");

        }catch(err){
            console.error(err);
            setStatus("RMU read error");
        }
    };

    reader.readAsArrayBuffer(file);
}

function loadGoogleSheet(){
    if(!sheetTab){
        alert("Load RMU first");
        return;
    }

    setStatus("Loading Google Sheet...");

    const cb = "cb_" + Date.now();

    window[cb] = function(res){
        try{
            let rows = res.table.rows || [];
            sheetData = [];

            rows.forEach(r => {
                let c = r.c || [];

                let id = norm(cellText(c[2]));
                let first = cellText(c[3]);
                let last = cellText(c[4]);
                let shift = cellText(c[5]);
                let flight = cellText(c[6]);
                let updatedBy = cellText(c[7]);
                let postal = cellText(c[8]);
                let remarks = cellText(c[9]);

                if(id && shift.includes("CSSU T2")){
                    sheetData.push({
                        id,
                        first,
                        last,
                        shift,
                        flight,
                        updatedBy,
                        postal,
                        remarks,
                        rawText: [
                            cellText(c[0]),
                            cellText(c[1]),
                            cellText(c[2]),
                            cellText(c[3]),
                            cellText(c[4]),
                            cellText(c[5]),
                            cellText(c[6]),
                            cellText(c[7]),
                            cellText(c[8]),
                            cellText(c[9])
                        ].join(" ")
                    });
                }
            });

            setStatus("Google Sheet Loaded: " + sheetData.length + " CSSU T2 officers");

        }catch(e){
            console.error(e);
            setStatus("Google Sheet parse error");
        }
    };

    let script = document.createElement("script");
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(sheetTab)}`;
    document.body.appendChild(script);
}

function isCancelled(s){
    let text = (
        (s.flight || "") + " " +
        (s.remarks || "") + " " +
        (s.postal || "") + " " +
        (s.updatedBy || "") + " " +
        (s.rawText || "")
    ).toLowerCase();

    const cancelWords = [
        "cancel",
        "cancelled",
        "canceled",
        "cancel booking",
        "cancelled booking",
        "canceled booking",
        "absent",
        "absence",
        "no show",
        "noshow",
        "dnr",
        "did not report",
        "didnt report",
        "didn't report",
        "mc",
        "medical",
        "medical leave"
    ];

    return cancelWords.some(w => text.includes(w));
}

function analyze(){
    if(!rmuData.length){
        alert("Load RMU first");
        return;
    }

    if(!sheetData.length){
        alert("Load Google Sheet first");
        return;
    }

    let rmap = new Map();
    let smap = new Map();

    rmuData.forEach(r => rmap.set(r.id, r));

    // Important fix:
    // If same ID appears more than once in Google Sheet,
    // any row with cancel / absent / cancelled booking will win.
    sheetData.forEach(s => {
        if(!smap.has(s.id)){
            smap.set(s.id, s);
        }else{
            let existing = smap.get(s.id);

            if(isCancelled(s)){
                smap.set(s.id, s);
            }else if(!isCancelled(existing)){
                smap.set(s.id, existing);
            }
        }
    });

    finalData = [];

    // Final report follows RMU initial sequence.
    // Every RMU CSSU T2 officer is kept.
    // If officer is missing from Google Sheet, mark Cancelled.
    rmuData.forEach(r => {
        let s = smap.get(r.id);
        let remark = "Cancelled";
        let googleNote = "";

        if(s){
            remark = isCancelled(s) ? "Cancelled" : "Onduty";
            googleNote = clean((s.flight || "") + " " + (s.remarks || ""));
        }

        finalData.push({
            ...r.original,
            "Remark": remark,
            "_Google Note": googleNote
        });
    });

    // Extra officers found in Google Sheet but not in RMU initial are appended after RMU sequence.
    sheetData.forEach(s => {
        if(!rmap.has(s.id)){
            let time = parseTimeFromShift(s.shift);

            finalData.push({
                "External Demand ID": "",
                "Deployment Location": s.shift,
                "Deployment Date": sheetTab.replaceAll(".", "/"),
                "Shift Start Time": time.start,
                "Shift End Time": time.end,
                "Total Shift Hours": time.hours,
                "Personnel no.": s.id,
                "Person First Name": s.first,
                "Person Last Name": s.last,
                "Remark": isCancelled(s) ? "Cancelled" : "Onduty",
                "_Google Note": clean((s.flight || "") + " " + (s.remarks || ""))
            });
        }
    });

    render();
    setStatus("Analysis Done. Final rows: " + finalData.length);
}

function render(){
    let table = document.getElementById("table");

    table.innerHTML = `
    <tr>
        <th>Remark</th>
        <th>Personnel no.</th>
        <th>Name</th>
        <th>Deployment Location</th>
        <th>Google Flight / Remark</th>
    </tr>`;

    finalData.forEach(r => {
        let cls = r["Remark"] === "Onduty" ? "onduty" : "cancel";
        let name = clean(r["Person First Name"]) + " " + clean(r["Person Last Name"]);

        table.innerHTML += `
        <tr class="${cls}">
            <td>${r["Remark"]}</td>
            <td>${r["Personnel no."]}</td>
            <td>${name}</td>
            <td>${r["Deployment Location"]}</td>
            <td>${r["_Google Note"] || ""}</td>
        </tr>`;
    });
}

function exportExcel(){
    if(!finalData.length){
        alert("Analyze first");
        return;
    }

    const exportRows = finalData.map(r => ({
        "External Demand ID": r["External Demand ID"] || "",
        "Deployment Location": r["Deployment Location"] || "",
        "Deployment Date": r["Deployment Date"] || sheetTab.replaceAll(".", "/"),
        "Shift Start Time": r["Shift Start Time"] || "",
        "Shift End Time": r["Shift End Time"] || "",
        "Total Shift Hours": r["Total Shift Hours"] || "",
        "Personnel no.": r["Personnel no."] || "",
        "Person First Name": r["Person First Name"] || "",
        "Person Last Name": r["Person Last Name"] || "",
        "Remark": r["Remark"] || ""
    }));

    let ws = XLSX.utils.json_to_sheet(exportRows);
    let wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "PBSU T2");

    XLSX.writeFile(wb, `RMU_CSSU_T2_Final_${sheetTab}.xlsx`);
}
</script>

</body>
</html>
