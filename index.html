<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PBSU T2 Flexi</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
* { box-sizing: border-box; }
body { margin:0; font-family:Arial; background:#f4f6f8; }
.app { display:flex; height:100vh; overflow:hidden; }
.left { width:45%; min-width:280px; padding:16px; overflow:auto; background:white; }
.right { width:55%; min-width:280px; border-left:1px solid #ccc; overflow:hidden; }
iframe { width:100%; height:100%; border:none; }

.splitter {
    width:10px; flex:0 0 10px; cursor:col-resize;
    background:#eef0f2; position:relative;
    border-left:1px solid #d6d6d6; border-right:1px solid #d6d6d6;
}
.splitter::after {
    content:"⋮"; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); width:20px; height:48px;
    border:1px solid #d6d6d6; border-radius:12px; background:white;
    color:#888; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
}
.splitter.dragging { background:#dbeafe; }
body.resizing { cursor:col-resize; user-select:none; }
body.resizing iframe { pointer-events:none; }

@media(max-width:800px){
    .app{display:block;height:auto;overflow:auto;}
    .left,.right{width:100%!important;min-width:0;height:auto;}
    .right{height:500px;border-left:0;border-top:1px solid #ccc;}
    .splitter{display:none;}
}

button { padding:8px 12px; margin:4px 3px; cursor:pointer; border:1px solid #bbb; border-radius:5px; background:#fff; font-weight: bold; }
button:hover { background:#f0f0f0; }
button.primary { background:#2563eb; color:white; border-color:#1d4ed8; }
button.primary:hover { background:#1d4ed8; }

.card { background:#f8fafc; padding:10px 14px; margin:10px 0; border:1px solid #ddd; border-radius:6px; }

.dropbox {
    border:2px dashed #999; background:#fafafa;
    padding:22px; text-align:center; cursor:pointer;
    border-radius:10px; margin-top:8px;
}
.dropbox.dragover { border-color:#2563eb; background:#dbeafe; }
.file-name { margin-top:8px; font-weight:bold; color:#2563eb; }

table { width:100%; border-collapse:collapse; font-size:12px; margin-top:8px; }
th, td { border:1px solid #ccc; padding:5px 7px; text-align:left; }
th { background:#f0f0f0; }

.onduty { background:#d1fae5; }
.cancel { background:#fff200; }

.tab-input { display:flex; align-items:center; gap:6px; margin-top:6px; flex-wrap:wrap; }
.tab-input input { border:1px solid #bbb; border-radius:4px; padding:5px 8px; font-size:13px; width:150px; }
.status-box { padding:8px 12px; border-radius:5px; margin:4px 0; font-size:13px; }
.status-box.info { background:#eff6ff; border:1px solid #bfdbfe; color:#1e40af; }
.status-box.ok { background:#f0fdf4; border:1px solid #bbf7d0; color:#166534; }
.status-box.warn { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }
.status-box.err { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }

.badge { padding:4px 10px; border-radius:12px; font-size:12px; font-weight:bold; margin-right:5px; }
.badge.green { background:#d1fae5; color:#065f46; }
.badge.yellow { background:#fef9c3; color:#854d0e; }
</style>
</head>
<body>

<div class="app">
<div class="left">
<h2 style="margin:0 0 10px">PBSU T2 Flexi (Amended)</h2>

<div class="card">
  <b>1. Upload RMU Initial Excel</b>
  <div id="dropbox" class="dropbox" onclick="document.getElementById('rmuFile').click()">
    Drop RMU Flexi Roster here<br>or click to choose file
    <div id="fileName" class="file-name">No file selected</div>
  </div>
  <input type="file" id="rmuFile" accept=".xlsx,.xls" style="display:none">
</div>

<div class="card">
  <b>2. Google Sheet Tab Name</b>
  <div class="tab-input">
    <input type="text" id="tabInput" placeholder="e.g. 07.05.2026" />
    <button onclick="autoDetectTab()">Auto-detect</button>
  </div>
</div>

<div class="card">
  <button class="primary" onclick="loadGoogleSheetAndAnalyze()">3. Load Google Sheet &amp; Analyze</button>
  <button onclick="exportExcel()">4. Export Final Excel</button>
</div>

<div id="statusDiv" class="status-box info">Upload RMU file to start.</div>
<div id="summaryDiv" style="margin-bottom:10px;"></div>

<table id="table">
  <tr><th>Remark</th><th>ID</th><th>Name</th><th>Location</th><th>Note</th></tr>
</table>
</div>

<div class="splitter" id="splitter"></div>

<div class="right">
  <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vT5UZfpu4IBxSX88YzvHa4nblcl82pCxemsLtl5ZsJf1CIIViGJpvX8MDtpvo1RR3kl76APBZ6FVyK-/pubhtml?gid=1412520827&widget=true&headers=false"></iframe>
</div>
</div>

<script>
const SHEET_ID = "1i_OR3qFI6lFryycpmuwg1M5mwxxKNRXNZS77MbOp5qc";
let rmuData=[], sheetData=[], finalData=[];

// ── Helpers ───────────────────────────────────────────────
const clean = (v) => (v ?? "").toString().replace(/\s+/g," ").trim();
const norm = (v) => clean(v).replace(/\.0$/,"");
const setStatus = (s,type="info") => {
    const d=document.getElementById("statusDiv");
    d.textContent=s; d.className="status-box "+type;
};

function detectDateFromName(name){
    let m=name.match(/(\d{6})/);
    if(!m) return "";
    let d=m[1];
    return d.slice(0,2)+"."+d.slice(2,4)+".20"+d.slice(4,6);
}

function autoDetectTab(){
    const fname = document.getElementById("fileName").textContent;
    const det = detectDateFromName(fname);
    if(det) document.getElementById("tabInput").value = det;
}

const cellText = (cell) => cell ? clean(cell.f ?? cell.v ?? "") : "";

// ── RMU Parsing ───────────────────────────────────────────
document.getElementById("rmuFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById("fileName").textContent = file.name;
    autoDetectTab();
    
    let reader = new FileReader();
    reader.onload = evt => {
        try {
            let wb = XLSX.read(new Uint8Array(evt.target.result), {type:"array"});
            let ws = wb.Sheets[wb.SheetNames[0]];
            let data = XLSX.utils.sheet_to_json(ws);
            
            rmuData = data.filter(r => clean(r["Deployment Location"]).toUpperCase().includes("CSSU T2"))
                .map(r => ({
                    id: norm(r["Personnel no."]),
                    original: {
                        "External Demand ID": clean(r["External Demand ID"]),
                        "Deployment Location": clean(r["Deployment Location"]),
                        "Deployment Date": r["Deployment Date"],
                        "Shift Start Time": r["Shift Start Time"],
                        "Shift End Time": r["Shift End Time"],
                        "TOTAL SHIFT HOURS": r["Total Shift Hours"],
                        "Personnel no.": norm(r["Personnel no."]),
                        "Person First Name": clean(r["Person First Name"]),
                        "Person Last Name": clean(r["Person Last Name"])
                    }
                }));
            setStatus(`✅ RMU loaded: ${rmuData.length} officers.`, "ok");
        } catch(err) { setStatus("❌ Error reading RMU file", "err"); }
    };
    reader.readAsArrayBuffer(file);
});

// ── Google Sheet Analysis ─────────────────────────────────
function loadGoogleSheetAndAnalyze(){
    const tabName = document.getElementById("tabInput").value.trim();
    if(!tabName || !rmuData.length) { alert("Complete Step 1 and 2 first"); return; }
    
    setStatus(`Loading tab "${tabName}"...`, "info");
    const cb = "cb_" + Date.now();
    let timeout = setTimeout(() => setStatus("❌ Load timed out. Check tab name.", "err"), 10000);

    window[cb] = function(res){
        clearTimeout(timeout);
        try {
            let rows = res.table.rows || [];
            let cols = res.table.cols || [];
            
            // Auto-detect column indices based on header labels
            let idIdx = -1, shiftIdx = -1, flightIdx = -1, noteIdx = -1;
            rows[0].c.forEach((cell, i) => {
                let txt = cellText(cell).toUpperCase();
                if(txt === "ID") idIdx = i;
                if(txt.includes("SHIFT")) shiftIdx = i;
                if(txt.includes("FLIGHT")) flightIdx = i;
                if(txt.includes("REMARK")) noteIdx = i;
            });

            // Fallback to defaults if headers not found
            if(idIdx === -1) idIdx = 2;
            if(shiftIdx === -1) shiftIdx = 5;

            sheetData = [];
            rows.forEach((r, idx) => {
                if(idx === 0) return; // Skip header
                let c = r.c || [];
                let id = norm(cellText(c[idIdx]));
                let shift = cellText(c[shiftIdx]);
                
                if(id && shift.toUpperCase().includes("CSSU T2")){
                    sheetData.push({
                        id,
                        shift,
                        flight: cellText(c[flightIdx]),
                        remarks: cellText(c[noteIdx]),
                        raw: c.map(cell => cellText(cell).toLowerCase()).join(" ")
                    });
                }
            });

            if(sheetData.length === 0) {
                alert(`Data found, but none matched "CSSU T2" in column ${shiftIdx + 1}. First row value: "${cellText(rows[1].c[shiftIdx])}"`);
                return;
            }
            
            analyze();
        } catch(e) { setStatus("❌ Parse error: " + e.message, "err"); }
    };

    let script = document.createElement("script");
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tabName)}`;
    document.body.appendChild(script);
}

function analyze(){
    let smap = new Map();
    sheetData.forEach(s => {
        const isCancel = ["cancel","absent","noshow","dnr","mc"].some(w => s.raw.includes(w));
        if(!smap.has(s.id) || isCancel) smap.set(s.id, { ...s, isCancel });
    });

    finalData = rmuData.map(r => {
        let s = smap.get(r.id);
        let status = s ? (s.isCancel ? "Cancelled" : "Onduty") : "Cancelled";
        return { ...r.original, "Remark": status, "_Note": s ? clean(s.flight + " " + s.remarks) : "" };
    });

    render();
}

function render(){
    let t = document.getElementById("table");
    t.innerHTML = `<tr><th>Remark</th><th>ID</th><th>Name</th><th>Location</th><th>Note</th></tr>`;
    let onduty = 0;
    finalData.forEach(r => {
        if(r.Remark === "Onduty") onduty++;
        let cls = r.Remark === "Onduty" ? "onduty" : "cancel";
        t.innerHTML += `<tr class="${cls}"><td>${r.Remark}</td><td>${r["Personnel no."]}</td><td>${r["Person First Name"]}</td><td>${r["Deployment Location"]}</td><td>${r._Note}</td></tr>`;
    });
    
    document.getElementById("summaryDiv").innerHTML = `<span class="badge green">Onduty: ${onduty}</span><span class="badge yellow">Cancelled: ${finalData.length - onduty}</span>`;
    setStatus("✅ Analysis Complete", "ok");
}

async function exportExcel(){
    const workbook = new ExcelJS.Workbook();
    const ws = workbook.addWorksheet("Final");
    const headers = Object.keys(finalData[0]).filter(k => k !== "_Note");
    ws.addRow(headers);
    finalData.forEach(r => {
        const row = ws.addRow(headers.map(h => r[h]));
        if(r.Remark === "Cancelled") row.getCell(headers.indexOf("Remark")+1).fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FFFFFF00'}};
    });
    const buf = await workbook.xlsx.writeBuffer();
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([buf]));
    link.download = "RMU_Final.xlsx";
    link.click();
}

// Splitter Logic
document.getElementById("splitter").addEventListener("mousedown", e => {
    document.body.classList.add("resizing");
    const move = (ev) => {
        let pct = (ev.clientX / window.innerWidth) * 100;
        document.querySelector(".left").style.width = pct + "%";
        document.querySelector(".right").style.width = (100 - pct) + "%";
    };
    const up = () => { document.body.classList.remove("resizing"); window.removeEventListener("mousemove", move); };
    window.addEventListener("mousemove", move);
    window.addEventListener("mouseup", up);
});
</script>
</body>
</html>
