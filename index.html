<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PBSU T2 Flexi Management</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<style>
* { box-sizing: border-box; }
body { margin:0; font-family:Arial, sans-serif; background:#f4f6f8; color: #333; }
.app { display:flex; height:100vh; overflow:hidden; }
.left { width:45%; min-width:320px; padding:20px; overflow:auto; background:white; border-right: 1px solid #ddd; }
.right { width:55%; min-width:320px; overflow:hidden; background: #eee; }
iframe { width:100%; height:100%; border:none; }

.splitter {
    width:10px; flex:0 0 10px; cursor:col-resize;
    background:#eef0f2; position:relative;
    border-left:1px solid #d6d6d6; border-right:1px solid #d6d6d6;
}
.splitter::after {
    content:"⋮"; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); width:20px; height:48px;
    border:1px solid #d6d6d6; border-radius:12px; background:white;
    color:#888; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
}

button { padding:10px 16px; margin:4px 2px; cursor:pointer; border:1px solid #bbb; border-radius:6px; background:#fff; font-weight: bold; transition: 0.2s; }
button:hover { background:#f0f0f0; border-color: #888; }
button.primary { background:#2563eb; color:white; border-color:#1d4ed8; }
button.primary:hover { background:#1d4ed8; }

.card { background:#f8fafc; padding:15px; margin:12px 0; border:1px solid #ddd; border-radius:8px; }
.dropbox { border:2px dashed #aaa; background:#fafafa; padding:25px; text-align:center; cursor:pointer; border-radius:10px; }
.dropbox.dragover { border-color:#2563eb; background:#dbeafe; }
.file-name { margin-top:10px; font-weight:bold; color:#2563eb; font-size: 14px; }

table { width:100%; border-collapse:collapse; font-size:12px; margin-top:10px; background: white; }
th, td { border:1px solid #ccc; padding:8px; text-align:left; }
th { background:#f1f5f9; position: sticky; top: 0; }

.onduty { background:#d1fae5; color: #065f46; }
.cancel { background:#fef9c3; color: #854d0e; }

.tab-input { display:flex; align-items:center; gap:8px; margin-top:8px; }
.tab-input input { border:1px solid #bbb; border-radius:5px; padding:8px; font-size:14px; width:160px; }

.status-box { padding:10px 15px; border-radius:6px; margin:10px 0; font-size:13px; border-left: 5px solid transparent; }
.status-box.info { background:#eff6ff; border-color:#3b82f6; color:#1e40af; }
.status-box.ok { background:#f0fdf4; border-color:#22c55e; color:#166534; }
.status-box.err { background:#fef2f2; border-color:#ef4444; color:#991b1b; }

.badge { padding:5px 12px; border-radius:15px; font-size:12px; font-weight:bold; margin-right:8px; display: inline-block; }
.badge.green { background:#d1fae5; color:#065f46; }
.badge.yellow { background:#fef9c3; color:#854d0e; }
</style>
</head>
<body>

<div class="app">
<div class="left">
<h2 style="margin:0 0 15px; color:#1e293b;">PBSU T2 Flexi Management</h2>

<div class="card">
  <b>1. Upload RMU Finalized Excel</b>
  <div id="dropbox" class="dropbox" onclick="document.getElementById('rmuFile').click()">
    Drop RMU file here<br>or click to browse
    <div id="fileName" class="file-name">No file selected</div>
  </div>
  <input type="file" id="rmuFile" accept=".xlsx,.xls" style="display:none">
</div>

<div class="card">
  <b>2. Google Sheet Tab Date</b>
  <div class="tab-input">
    <input type="text" id="tabInput" placeholder="e.g. 07.05.2026" />
    <button onclick="autoDetectTab()">Auto-detect</button>
  </div>
</div>

<div style="display:flex; gap:10px;">
  <button class="primary" style="flex:1" onclick="loadGoogleSheetAndAnalyze()">3. Run Analysis</button>
  <button style="flex:1" onclick="exportExcel()">4. Export Excel</button>
</div>

<div id="statusDiv" class="status-box info">Ready. Please upload RMU file to start.</div>
<div id="summaryDiv"></div>

<table id="table">
  <thead>
    <tr><th>Remark</th><th>ID</th><th>Name</th><th>Deployment Location</th><th>Flight/Note</th></tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
</div>

<div class="splitter" id="splitter"></div>

<div class="right">
  <iframe id="sheetFrame" src="https://docs.google.com/spreadsheets/d/e/2PACX-1vT5UZfpu4IBxSX88YzvHa4nblcl82pCxemsLtl5ZsJf1CIIViGJpvX8MDtpvo1RR3kl76APBZ6FVyK-/pubhtml?gid=1412520827&widget=true&headers=false"></iframe>
</div>
</div>

<script>
const SHEET_ID = "1i_OR3qFI6lFryycpmuwg1M5mwxxKNRXNZS77MbOp5qc";
let rmuData=[], sheetData=[], finalData=[];

const clean = (v) => (v ?? "").toString().replace(/\s+/g," ").trim();

// Strict normalizer for IDs (Removes commas, spaces, handles alphanumeric like G2709731L)
const norm = (v) => clean(v).replace(/\.0$/, "").replace(/,/g, "").replace(/\s/g, "").toUpperCase();

const setStatus = (s,type="info") => {
    const d=document.getElementById("statusDiv");
    d.textContent=s; d.className="status-box "+type;
};

function detectDateFromName(name){
    let m=name.match(/(\d{6})/);
    if(!m) return "";
    let d=m[1]; 
    return d.slice(0,2)+"."+d.slice(2,4)+".20"+d.slice(4,6);
}

function autoDetectTab(){
    const fname = document.getElementById("fileName").textContent;
    const det = detectDateFromName(fname);
    if(det) {
        document.getElementById("tabInput").value = det;
        setStatus("Detected date: " + det, "ok");
    }
}

const cellText = (cell) => cell ? clean(cell.f ?? cell.v ?? "") : "";

// ── Step 1: RMU File Loading ─────────────────────────────
document.getElementById("rmuFile").addEventListener("change", e => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById("fileName").textContent = file.name;
    autoDetectTab();
    
    let reader = new FileReader();
    reader.onload = evt => {
        try {
            let wb = XLSX.read(new Uint8Array(evt.target.result), {type:"array"});
            let ws = wb.Sheets[wb.SheetNames[0]];
            let data = XLSX.utils.sheet_to_json(ws);
            
            rmuData = data.filter(r => {
                let loc = clean(r["Deployment Location"] || "").toUpperCase();
                return loc.includes("CSSU T2");
            }).map(r => ({
                id: norm(r["Personnel no."] || r["Personnel No."] || r["EE ID"]),
                original: {
                    "External Demand ID": clean(r["External Demand ID"]),
                    "Deployment Location": clean(r["Deployment Location"]),
                    "Deployment Date": r["Deployment Date"],
                    "Shift Start Time": r["Shift Start Time"],
                    "Shift End Time": r["Shift End Time"],
                    "TOTAL SHIFT HOURS": r["Total Shift Hours"] || r["TOTAL HOURS"],
                    "Personnel no.": norm(r["Personnel no."] || r["Personnel No."] || r["EE ID"]),
                    "Person First Name": clean(r["Person First Name"] || r["Name"] || ""),
                    "Person Last Name": clean(r["Person Last Name"] || "")
                }
            }));
            setStatus(`✅ RMU File Ready: ${rmuData.length} CSSU T2 officers found.`, "ok");
        } catch(err) { setStatus("❌ Error reading RMU file. Check format.", "err"); }
    };
    reader.readAsArrayBuffer(file);
});

// ── Step 3: Google Sheet Analysis ─────────────────────────
function loadGoogleSheetAndAnalyze(){
    const tabName = document.getElementById("tabInput").value.trim();
    if(!tabName) { alert("Please enter or auto-detect the Tab Name (Step 2)"); return; }
    if(!rmuData.length) { alert("Please upload the RMU Excel file first (Step 1)"); return; }
    
    setStatus(`Connecting to Google Sheet tab "${tabName}"...`, "info");
    const cb = "cb_" + Date.now();
    
    let timeout = setTimeout(() => {
        if(window[cb]) setStatus("❌ Connection timed out. Is the tab name correct?", "err");
    }, 12000);

    window[cb] = function(res){
        clearTimeout(timeout);
        try {
            let rows = res.table.rows || [];
            if(!rows.length) { setStatus("⚠️ Tab found but it is empty.", "err"); return; }

            sheetData = [];
            
            // Scan EVERY row to find matches independently of columns
            rows.forEach((r, idx) => {
                if(idx === 0) return; // Skip top header row
                
                let c = r.c || [];
                let rowArr = c.map(cell => cellText(cell));
                let rawStr = rowArr.join(" ").toUpperCase();
                
                // Only process rows that clearly belong to CSSU T2
                if(rawStr.includes("CSSU T2")) {
                    
                    let idValue = "";
                    // Scan the first 5 columns to find an ID (must have at least 4 digits)
                    for(let i=0; i<5; i++){
                        let val = norm(rowArr[i]);
                        if(val.length >= 5 && /\d{4}/.test(val)) { 
                            idValue = val; 
                            break; 
                        }
                    }

                    // Find where the shift info is located
                    let shiftIdx = rowArr.findIndex(txt => txt.toUpperCase().includes("CSSU T2"));
                    let shiftValue = shiftIdx !== -1 ? rowArr[shiftIdx] : "CSSU T2";
                    
                    // Everything to the right of the shift is a remark/flight
                    let noteValue = "";
                    if(shiftIdx !== -1 && shiftIdx < rowArr.length - 1) {
                        noteValue = rowArr.slice(shiftIdx + 1).filter(v => v !== "").join(" | ");
                    }

                    if(idValue) {
                        sheetData.push({
                            id: idValue,
                            shift: shiftValue,
                            remarks: noteValue,
                            rawText: rawStr
                        });
                    }
                }
            });

            if(sheetData.length === 0) {
                alert(`Error: No 'CSSU T2' data found!\n\nGoogle likely loaded the wrong tab. Check if the date in Step 2 perfectly matches your Google Sheet tab.`);
                setStatus("❌ Data Mismatch - Wrong Tab?", "err");
                return;
            }
            
            performJoin();
        } catch(e) { 
            console.error(e);
            setStatus("❌ Parse Error: " + e.message, "err"); 
        }
    };

    let script = document.createElement("script");
    script.src = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tabName)}`;
    document.body.appendChild(script);
}

function performJoin(){
    let smap = new Map();
    sheetData.forEach(s => {
        const cancelKeywords = ["CANCEL", "ABSENT", "NOSHOW", "DNR", "MC", "MEDICAL"];
        const isCancel = cancelKeywords.some(w => s.rawText.includes(w));
        
        // Prioritize cancellations if there are duplicates
        if(!smap.has(s.id) || isCancel) {
            smap.set(s.id, { ...s, isCancel });
        }
    });

    finalData = rmuData.map(r => {
        let s = smap.get(r.id);
        let status = s ? (s.isCancel ? "Cancelled" : "Onduty") : "Cancelled";
        return { 
            ...r.original, 
            "Remark": status, 
            "_Note": s ? s.remarks : "No Google Record" 
        };
    });

    renderTable();
}

function renderTable(){
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    let ondutyCount = 0;
    
    finalData.forEach(r => {
        const isOnduty = r.Remark === "Onduty";
        if(isOnduty) ondutyCount++;
        
        const row = document.createElement("tr");
        row.className = isOnduty ? "onduty" : "cancel";
        
        row.innerHTML = `
            <td>${r.Remark}</td>
            <td>${r["Personnel no."]}</td>
            <td>${r["Person First Name"]} ${r["Person Last Name"]}</td>
            <td>${r["Deployment Location"]}</td>
            <td>${r._Note}</td>
        `;
        tbody.appendChild(row);
    });
    
    document.getElementById("summaryDiv").innerHTML = `
        <div style="margin: 10px 0;">
            <span class="badge green">Onduty: ${ondutyCount}</span>
            <span class="badge yellow">Cancelled/Absent: ${finalData.length - ondutyCount}</span>
            <span class="badge" style="background:#e2e8f0; color:#333;">Total: ${finalData.length}</span>
        </div>
    `;
    setStatus("✅ Analysis Complete.", "ok");
}

async function exportExcel(){
    if(!finalData.length) { alert("Run analysis first!"); return; }
    const workbook = new ExcelJS.Workbook();
    const ws = workbook.addWorksheet("PBSU T2 Final");
    
    const headers = ["External Demand ID","Deployment Location","Deployment Date","Shift Start Time","Shift End Time","TOTAL SHIFT HOURS","Personnel no.","Person First Name","Person Last Name","Remark"];
    ws.addRow(headers);
    
    ws.getRow(1).eachCell(c => {
        c.font = { bold: true };
        c.fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFD9D9D9'} };
    });

    finalData.forEach(r => {
        const row = ws.addRow(headers.map(h => r[h]));
        if(r.Remark === "Cancelled") {
            row.getCell(10).fill = { type: 'pattern', pattern:'solid', fgColor:{argb:'FFFFFF00'} };
        }
    });

    ws.columns.forEach(col => col.width = 18);
    
    const buffer = await workbook.xlsx.writeBuffer();
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([buffer]));
    const dateStr = document.getElementById("tabInput").value.replace(/\./g, "");
    link.download = `RMU_Finalized_${dateStr}.xlsx`;
    link.click();
}

const splitter = document.getElementById("splitter");
splitter.addEventListener("mousedown", e => {
    document.body.classList.add("resizing");
    const onMove = (ev) => {
        let pct = (ev.clientX / window.innerWidth) * 100;
        if(pct > 20 && pct < 80) {
            document.querySelector(".left").style.width = pct + "%";
            document.querySelector(".right").style.width = (100 - pct) + "%";
        }
    };
    const onUp = () => {
        document.body.classList.remove("resizing");
        window.removeEventListener("mousemove", onMove);
        window.removeEventListener("mouseup", onUp);
    };
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
});
</script>
</body>
</html>
